name: user_app
description: "Smart Care-Connect — 시니어 안전 모니터링 Flutter 앱"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ─── State Management (BLoC) ─────────────────────────────────────────────
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4

  # ─── Dependency Injection ────────────────────────────────────────────────
  get_it: ^7.7.0
  injectable: ^2.4.4

  # ─── Functional Error Handling (Either<Failure, Success>) ────────────────
  dartz: ^0.10.1
  equatable: ^2.0.5

  # ─── Firebase / Firestore ────────────────────────────────────────────────
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3

  # ─── Utils ───────────────────────────────────────────────────────────────
  intl: ^0.19.0

  # ─── Charts ──────────────────────────────────────────────────────────────
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # ─── Code generation (injectable / DI) ───────────────────────────────────
  # 생성 명령:
  #   dart run build_runner build --delete-conflicting-outputs
  build_runner: ^2.4.13
  injectable_generator: ^2.6.2

flutter:
  uses-material-design: true
